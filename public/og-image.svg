<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e27"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#b400ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b400ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#b400ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="12" stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Logo badge -->
  <rect x="80" y="72" width="52" height="52" rx="12" fill="url(#accentGrad)"/>
  <text x="106" y="107" font-family="Arial Black, Arial" font-weight="900" font-size="26" fill="#0a0e27" text-anchor="middle">M</text>

  <!-- Brand name -->
  <text x="150" y="107" font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="white">Marketing</text>
  <text x="339" y="107" font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="url(#textGrad)"> z AI</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="white" letter-spacing="-2">Performance</text>
  <text x="80" y="330" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="url(#textGrad)" letter-spacing="-2">Marketing z AI</text>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">Meta oglaševanje · Google Ads · CRM integracije · AI agenti</text>

  <!-- Stats row -->
  <rect x="80" y="460" width="200" height="90" rx="12" fill="#1a1f3a" stroke="#2d3561" stroke-width="1"/>
  <text x="180" y="505" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="url(#textGrad)" text-anchor="middle">11 let</text>
  <text x="180" y="535" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">izkušenj</text>

  <rect x="300" y="460" width="200" height="90" rx="12" fill="#1a1f3a" stroke="#2d3561" stroke-width="1"/>
  <text x="400" y="505" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="url(#textGrad)" text-anchor="middle">771%</text>
  <text x="400" y="535" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">ROI</text>

  <rect x="520" y="460" width="200" height="90" rx="12" fill="#1a1f3a" stroke="#2d3561" stroke-width="1"/>
  <text x="620" y="505" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="url(#textGrad)" text-anchor="middle">6 AI</text>
  <text x="620" y="535" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">agentov</text>

  <!-- Right side decorative agent silhouette -->
  <g transform="translate(900, 200)" opacity="0.25">
    <!-- Head -->
    <ellipse cx="100" cy="60" rx="55" ry="60" fill="#00f0ff"/>
    <!-- Visor -->
    <rect x="55" y="50" width="90" height="22" rx="4" fill="#0a0e27"/>
    <rect x="60" y="53" width="36" height="14" rx="2" fill="#00f0ff" opacity="0.7"/>
    <rect x="104" y="53" width="36" height="14" rx="2" fill="#b400ff" opacity="0.7"/>
    <!-- Body -->
    <rect x="40" y="120" width="120" height="100" rx="12" fill="#00f0ff"/>
    <!-- Circuit lines -->
    <line x1="55" y1="140" x2="145" y2="140" stroke="#0a0e27" stroke-width="2" opacity="0.5"/>
    <line x1="55" y1="160" x2="100" y2="160" stroke="#0a0e27" stroke-width="2" opacity="0.5"/>
    <circle cx="120" cy="160" r="8" fill="#0a0e27" opacity="0.4"/>
    <!-- Arms -->
    <rect x="10" y="125" width="30" height="70" rx="10" fill="#00f0ff"/>
    <rect x="160" y="125" width="30" height="70" rx="10" fill="#00f0ff"/>
    <!-- Glow rings -->
    <circle cx="100" cy="60" r="70" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.3"/>
    <circle cx="100" cy="60" r="85" stroke="#b400ff" stroke-width="1" fill="none" opacity="0.15"/>
  </g>

  <!-- URL tag -->
  <rect x="80" y="575" width="260" height="36" rx="18" fill="#1a1f3a" stroke="#2d3561" stroke-width="1"/>
  <circle cx="100" cy="593" r="6" fill="url(#textGrad)"/>
  <text x="116" y="598" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">marketingzai.eu</text>

  <!-- Klemen Lorber tag -->
  <text x="1120" y="598" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="end">Klemen Lorber</text>
</svg>
